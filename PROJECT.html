<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <header>
        <div class="logo">Flipkart</div>

        <div class="search-box">
            <input type="text" placeholder="Search for products, brands and more">
        </div>

        <button class="login-btn">Login</button>

        <nav>
            <ul>
                <li>Become a Seller</li>
                <li>More</li>
                <li>Cart 🛒</li>
            </ul>
        </nav>
    </header>

    <!-- Categories -->
    <section class="categories">
        <div class="category">Mobiles</div>
        <div class="category">Fashion</div>
        <div class="category">Electronics</div>
        <div class="category">Home</div>
        <div class="category">Appliances</div>
        <div class="category">Travel</div>
        <div class="category">Beauty</div>
        <div class="category">Toys</div>
    </section>

    <!-- Banner -->
    <section class="banner">
        <h1>Big Billion Days Sale</h1>
        <p>Up to 80% OFF on Top Brands</p>
    </section>

    <!-- Products -->
    <section class="products">
        <h2>Best Deals</h2>

        <div class="product-container">

            <div class="product">
                <img src="https://via.placeholder.com/200" alt="">
                <h3>Smartphone</h3>
                <p>₹14,999</p>
                <button class="buy-btn">Buy Now</button>
            </div>

            <div class="product">
                <img src="https://via.placeholder.com/200" alt="">
                <h3>Laptop</h3>
                <p>₹49,999</p>
                <button class="buy-btn">Buy Now</button>
            </div>

            <div class="product">
                <img src="https://via.placeholder.com/200" alt="">
                <h3>Headphones</h3>
                <p>₹1,999</p>
                <button class="buy-btn">Buy Now</button>
            </div>

            <div class="product">
                <img src="https://via.placeholder.com/200" alt="">
                <h3>Smart Watch</h3>
                <p>₹2,999</p>
                <button class="buy-btn">Buy Now</button>
            </div>

        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 Flipkart Clone Project</p>
    </footer>

    <script src="script.js"></script>

</body>
</html>
